site_name: Roman Lutz
extra:
  name: Roman Lutz
  titles:
    - Responsible AI Engineering Lead
    - AI Red Teaming
    - Trust and Safety
    - Open Source

theme:
  name: null
  custom_dir: 'theme/'

hooks:
  - hooks.py

# Live-reload extra sources during `mkdocs serve` (the theme dir, the
# hook script, and the _data files loaded by the hook). The docs dir
# and mkdocs.yml are watched by default.
watch:
  - _data
  - hooks.py
  - theme
