name: Publish docs via GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Weekly rebuild so the live link-card stats (GitHub stars/contributors,
  # Semantic Scholar, Bluesky, Stack Overflow) refresh on their own without
  # needing a push. The build-time hook refetches because the committed
  # stats.json cache is older than its TTL on a weekly cadence.
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: dev/requirements.txt

      - name: Install dependencies
        run: pip install -r dev/requirements.txt

      - name: Build site
        run: mkdocs build --strict --config-file dev/mkdocs.yml

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dev/site

  deploy:
    name: Deploy site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
